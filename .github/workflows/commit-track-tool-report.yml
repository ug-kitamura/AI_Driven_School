name: commit-track-tool Report

on:
  schedule:
    - cron: "0 7 * * 1"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      days:
        description: "データ取得期間（日数）"
        required: true
        default: 7
        type: number
      active_days:
        description: "アクティブブランチ判定日数"
        required: true
        default: 30
        type: number
      target_owner:
        description: "対象のオーナーまたは Organization（CI と同じ既定はこのリポの owner）"
        required: true
        type: string
        default: "ug-kitamura"
      target_repo:
        description: "対象リポジトリ名（CI と同じ既定はこのリポの名前）"
        required: true
        type: string
        default: "AI_Driven_School"
      llm:
        description: "使用するAIモデル"
        required: true
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-opus-4-7
          - claude-haiku-4-5
        default: claude-sonnet-4-6

concurrency:
  group: commit-track-tool-report
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  comitora-report:
    name: Generate comitora report
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TARGET_OWNER:      ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_owner || 'ug-kitamura' }}
      TARGET_REPO:       ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_repo  || 'AI_Driven_School' }}
      DAYS:              ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.days         || 7 }}
      ACTIVE_DAYS:       ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.active_days  || 30 }}
      LLM:               ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.llm          || 'claude-sonnet-4-6' }}
    defaults:
      run:
        working-directory: commit-track-tool
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.8"
          enable-cache: true
          working-directory: commit-track-tool

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check target repository configuration
        run: |
          if [ -z "$TARGET_OWNER" ] || [ -z "$TARGET_REPO" ]; then
            echo "::error::TARGET_OWNER / TARGET_REPO が空です。"
            exit 1
          fi

      - name: Run full pipeline
        run: >
          uv run python src/main.py
          --owner "${TARGET_OWNER}"
          --repo "${TARGET_REPO}"
          --token "${GH_TOKEN}"
          --anthropic-key "${ANTHROPIC_API_KEY}"
          --days "${DAYS}"
          --active-days "${ACTIVE_DAYS}"
          --llm "${LLM}"

      - name: Stage output for artifact (exclude .gitkeep)
        working-directory: commit-track-tool
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/_comitora_report_output"
          n="$(find output -type f ! -name '.gitkeep' 2>/dev/null | wc -l)"
          if [ "$n" -eq 0 ]; then
            echo "::error::output に .gitkeep 以外のファイルがありません"
            exit 1
          fi
          find output -type f ! -name '.gitkeep' -print0 | while IFS= read -r -d '' f; do
            rel="${f#output/}"
            install -D "$f" "${GITHUB_WORKSPACE}/_comitora_report_output/$rel"
          done

      - name: Upload output artifacts
        uses: actions/upload-artifact@v7
        with:
          name: comitora-report-output-${{ github.run_id }}
          path: _comitora_report_output/
          if-no-files-found: error
