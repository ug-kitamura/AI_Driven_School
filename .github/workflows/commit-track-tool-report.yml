name: commit-track-tool Report

on:
  schedule:
    - cron: "0 7 * * 1"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      days:
        description: "データ取得期間（日数）"
        required: false
        default: 7
        type: number
      target_owner:
        description: "GitHub オーナー（空なら Variables の TARGET_OWNER）"
        required: false
        type: string
        default: ""
      target_repo:
        description: "リポジトリ名（空なら Variables の TARGET_REPO）"
        required: false
        type: string
        default: ""

concurrency:
  group: commit-track-tool-report
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  comitora-report:
    name: Generate comitora report
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TARGET_OWNER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_owner != '' && github.event.inputs.target_owner || vars.TARGET_OWNER }}
      TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_repo != '' && github.event.inputs.target_repo || vars.TARGET_REPO }}
      DAYS: ${{ github.event_name != 'workflow_dispatch' && 7 || github.event.inputs.days }}
    defaults:
      run:
        working-directory: commit-track-tool
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          working-directory: commit-track-tool

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check target repository configuration
        run: |
          if [ -z "$TARGET_OWNER" ] || [ -z "$TARGET_REPO" ]; then
            echo "::error::TARGET_OWNER / TARGET_REPO が空です。リポジトリ Variables に設定するか、手動実行で入力してください。"
            exit 1
          fi

      - name: Run full pipeline
        run: >
          uv run python src/main.py
          --owner "${TARGET_OWNER}"
          --repo "${TARGET_REPO}"
          --token "${GH_TOKEN}"
          --anthropic-key "${ANTHROPIC_API_KEY}"
          --days "${DAYS}"

      - name: Stage output for artifact (exclude .gitkeep)
        working-directory: commit-track-tool
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/_comitora_report_output"
          n="$(find output -type f ! -name '.gitkeep' 2>/dev/null | wc -l)"
          if [ "$n" -eq 0 ]; then
            echo "::error::output に .gitkeep 以外のファイルがありません"
            exit 1
          fi
          find output -type f ! -name '.gitkeep' -print0 | while IFS= read -r -d '' f; do
            rel="${f#output/}"
            install -D "$f" "${GITHUB_WORKSPACE}/_comitora_report_output/$rel"
          done

      - name: Upload output artifacts
        uses: actions/upload-artifact@v7
        with:
          name: comitora-report-output-${{ github.run_id }}
          path: _comitora_report_output/
          if-no-files-found: error
